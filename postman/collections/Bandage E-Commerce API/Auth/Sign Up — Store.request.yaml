$kind: http-request
name: Sign Up - Store
method: POST
url: '{{baseUrl}}/signup'
order: 3000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Store Owner",
      "email": "storeowner@example.com",
      "password": "Store1234!",
      "role_id": 2,
      "store": {
        "name": "My Bandage Store",
        "phone": "05321234567",
        "tax_no": "T1234V123456",
        "bank_account": "TR330006100519786457841326"
      }
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status code is 201 or 200', function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 201]);
      });

      pm.test('Response has a message or token', function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData).to.satisfy(function (d) {
              return d.message !== undefined || d.token !== undefined;
          });
      });

      pm.test('Response time is less than 5000ms', function () {
          pm.expect(pm.response.responseTime).to.be.below(5000);
      });
