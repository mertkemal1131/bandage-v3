$kind: http-request
description: >-
  Login with email and password.

  The test script automatically saves the returned token to the {{token}}
  collection variable.
url: "{{baseUrl}}/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "email": "testuser@example.com",
      "password": "Test1234!"
    }
scripts:
  - type: afterResponse
    code: |-
      const res = pm.response.json();
      if (res.token) {
        pm.collectionVariables.set('token', res.token);
        console.log('Token saved to collection variable');
      }
    language: text/javascript
order: 4000
